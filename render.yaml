services:
  - type: web
    name: certify-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py create_demo_user && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: USE_SQLITE
        value: "True"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
    healthCheckPath: /api/health/
